services:
  # Production
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=${APP_PORT:-8080}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-health_reminder}
      - DATABASE_MAX_OPEN_CONNECTIONS=${DATABASE_MAX_OPEN_CONNECTIONS:-10}
      - DATABASE_MAX_IDLE_CONNECTIONS=${DATABASE_MAX_IDLE_CONNECTIONS:-20}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - health-reminder-network
    restart: unless-stopped
    profiles:
      - production

  # Development (hot-reload dengan Air)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_PORT=${APP_PORT:-8080}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-health_reminder}
      - DATABASE_MAX_OPEN_CONNECTIONS=${DATABASE_MAX_OPEN_CONNECTIONS:-10}
      - DATABASE_MAX_IDLE_CONNECTIONS=${DATABASE_MAX_IDLE_CONNECTIONS:-20}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - health-reminder-network
    restart: unless-stopped
    profiles:
      - dev
  postgres:
    image: postgres:15-alpine
    container_name: health-reminder-db
    environment:
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=${DATABASE_NAME:-health_reminder}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-reminder-network
    restart: unless-stopped

networks:
  health-reminder-network:
    driver: bridge

volumes:
  postgres-data:
